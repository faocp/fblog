baseURL = 'https://fffelipe.com/'
languageCode = 'en-us'
title = "fffelipe's world wide web"

[params]
  author      = "faocp"
  description = "what's on my mind lately?"
  currently   = [
    "reading: anything that isn't a feed",
    "tinkering: this blog, some flashcards, a camera",
    "thinking about: what gets lost when obscurity disappears",
  ]

[[menus.main]]
  name   = "notes"
  url    = "/posts/"
  weight = 1

[[menus.main]]
  name   = "misc"
  url    = "/misc/"
  weight = 2

[[menus.main]]
  name   = "links"
  url    = "/links/"
  weight = 3

[[menus.main]]
  name   = "about"
  url    = "/about/"
  weight = 4

[markup.goldmark.renderer]
  # Content is authored locally/trusted; this permits intentional inline HTML in Markdown.
  unsafe = true

[markup.highlight]
  style     = "monokai"
  noClasses = true
