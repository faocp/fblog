baseURL = 'https://fffelipe.com/'
languageCode = 'en-us'
title = "fffelipe's world wide web"

[params]
  author      = "fffelipe"
  description = "what's on my mind lately?"
  currently   = [
    "reading: code by charles petzold",
    "tinkering: this blog, some flashcards, a camera",
    "thinking about: no thoughts, just vibes",
  ]

[[menus.main]]
  name   = "notes"
  url    = "/posts/"
  weight = 1

[[menus.main]]
  name   = "links"
  url    = "/links/"
  weight = 3

[[menus.main]]
  name   = "about"
  url    = "/about/"
  weight = 4

[markup.goldmark.renderer]
