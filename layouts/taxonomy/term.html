{{ define "main" }}
  <h1>posts tagged: {{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
    <li>
      <div class="post-list-link">
        <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>
    </li>
    {{ end }}
  </ul>
{{ end }}
