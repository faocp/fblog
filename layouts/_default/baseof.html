<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
{{ $bodyClasses := slice }}
{{ with .Section }}{{ $bodyClasses = $bodyClasses | append (printf "section-%s" .) }}{{ end }}
<body{{ with $bodyClasses }} class="{{ delimit . " " }}"{{ end }}>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
